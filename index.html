<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snow Rider 3D</title>

<style>

body{
    margin:0;
    overflow:hidden;
    background:#87ceeb;
    font-family:Arial, sans-serif;
}

canvas{
    display:block;
}

#ui{
    position:absolute;
    top:15px;
    left:15px;
    color:white;
    font-size:28px;
    font-weight:bold;
    text-shadow:2px 2px 4px black;
    z-index:10;
}

#menu{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,0.45);
    color:white;
    z-index:20;
}

#menu h1{
    font-size:64px;
    margin-bottom:20px;
}

#menu button{
    padding:16px 36px;
    font-size:24px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-weight:bold;
}

#controls{
    margin-top:20px;
    font-size:20px;
    text-align:center;
}

</style>
</head>

<body>

<div id="ui">
    Score: <span id="score">0</span>
</div>

<div id="menu">

    <h1>Snow Rider 3D</h1>

    <button id="startBtn">
        START
    </button>

    <div id="controls">
        Move: A / D or ← / →<br>
        Jump: SPACE
    </div>

</div>

<audio id="windSound" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8f2b6f6f0.mp3?filename=wind-ambience-110997.mp3">
</audio>

<audio id="jumpSound">
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_4a1d55f5cb.mp3?filename=jump-110990.mp3">
</audio>

<audio id="coinSound">
<source src="https://cdn.pixabay.com/download/audio/2022/03/10/audio_c8630b1cfd.mp3?filename=collectcoin-6075.mp3">
</audio>

<audio id="crashSound">
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_efcc8b0f7f.mp3?filename=impact-crash-110985.mp3">
</audio>

<script type="module">

import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js';

////////////////////////////////////////////////////////////
// SCENE
////////////////////////////////////////////////////////////

const scene = new THREE.Scene();

scene.background = new THREE.Color(0x9ed8ff);

scene.fog = new THREE.Fog(
    0xdff3ff,
    40,
    220
);

const camera = new THREE.PerspectiveCamera(
    80,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
);

const renderer = new THREE.WebGLRenderer({
    antialias:true
});

renderer.setSize(
    window.innerWidth,
    window.innerHeight
);

renderer.shadowMap.enabled = true;

document.body.appendChild(renderer.domElement);

////////////////////////////////////////////////////////////
// AUDIO
////////////////////////////////////////////////////////////

const windSound = document.getElementById('windSound');
const jumpSound = document.getElementById('jumpSound');
const coinSound = document.getElementById('coinSound');
const crashSound = document.getElementById('crashSound');

windSound.volume = 0.35;
jumpSound.volume = 0.5;
coinSound.volume = 0.4;
crashSound.volume = 0.6;

////////////////////////////////////////////////////////////
// LIGHTING
////////////////////////////////////////////////////////////

const hemi = new THREE.HemisphereLight(
    0xffffff,
    0xbfdfff,
    1.2
);

scene.add(hemi);

const sun = new THREE.DirectionalLight(
    0xffffff,
    1.3
);

sun.position.set(20,40,10);

sun.castShadow = true;

scene.add(sun);

////////////////////////////////////////////////////////////
// MOUNTAINS
////////////////////////////////////////////////////////////

function createMountain(x,z,scale){

    const mountain = new THREE.Mesh(

        new THREE.ConeGeometry(
            18 * scale,
            30 * scale,
            4
        ),

        new THREE.MeshStandardMaterial({
            color:0xbfc7cf,
            flatShading:true
        })
    );

    mountain.position.set(
        x,
        10 * scale,
        z
    );

    mountain.rotation.y =
        Math.random() * Math.PI;

    scene.add(mountain);

    const cap = new THREE.Mesh(

        new THREE.ConeGeometry(
            10 * scale,
            12 * scale,
            4
        ),

        new THREE.MeshStandardMaterial({
            color:0xffffff,
            flatShading:true
        })
    );

    cap.position.y = 14 * scale;

    mountain.add(cap);
}

for(let i=0;i<25;i++){

    createMountain(
        -180 + i * 16,
        -220,
        1 + Math.random() * 1.5
    );
}

////////////////////////////////////////////////////////////
// TERRAIN
////////////////////////////////////////////////////////////

const terrainGeo = new THREE.PlaneGeometry(
    70,
    5000,
    40,
    200
);

const pos = terrainGeo.attributes.position;

for(let i=0;i<pos.count;i++){

    const x = pos.getX(i);
    const y = pos.getY(i);

    const noise =
        Math.sin(x * 0.15) * 0.6 +
        Math.cos(y * 0.05) * 1.5 +
        Math.sin((x+y) * 0.03) * 1.2;

    pos.setZ(i,noise);
}

terrainGeo.computeVertexNormals();

const terrain = new THREE.Mesh(

    terrainGeo,

    new THREE.MeshStandardMaterial({
        color:0xffffff
    })
);

terrain.rotation.x = -Math.PI / 2;
terrain.position.z = -2400;
terrain.receiveShadow = true;

scene.add(terrain);

////////////////////////////////////////////////////////////
// WALLS
////////////////////////////////////////////////////////////

function createWall(x){

    const wall = new THREE.Mesh(

        new THREE.BoxGeometry(
            2,
            5,
            5000
        ),

        new THREE.MeshStandardMaterial({
            color:0x666666
        })
    );

    wall.position.set(
        x,
        2.5,
        -2400
    );

    scene.add(wall);
}

createWall(-15);
createWall(15);

////////////////////////////////////////////////////////////
// PLAYER
////////////////////////////////////////////////////////////

const player = {

    x:0,
    y:0,
    z:8,

    speed:0.9,

    sway:0,

    vy:0,

    grounded:true,

    turn:0,

    crashing:false,

    crashTimer:0
};

////////////////////////////////////////////////////////////
// SKIS
////////////////////////////////////////////////////////////

const skiGeo = new THREE.BoxGeometry(
    0.15,
    0.05,
    2.2
);

const skiMat = new THREE.MeshStandardMaterial({
    color:0x6b4423,
    roughness:0.9,
    metalness:0.05
});

const skiLeft = new THREE.Mesh(
    skiGeo,
    skiMat
);

const skiRight = new THREE.Mesh(
    skiGeo,
    skiMat
);

skiLeft.position.set(
    -0.3,
    -0.55,
    -1.2
);

skiRight.position.set(
    0.3,
    -0.55,
    -1.2
);

camera.add(skiLeft);
camera.add(skiRight);

scene.add(camera);

////////////////////////////////////////////////////////////
// SNOW PARTICLES
////////////////////////////////////////////////////////////

const driftSnow = [];

function createSnowParticle(){

    const particle = new THREE.Mesh(

        new THREE.SphereGeometry(
            0.08,
            6,
            6
        ),

        new THREE.MeshStandardMaterial({
            color:0xffffff,
            transparent:true,
            opacity:0.9
        })
    );

    particle.visible = false;

    scene.add(particle);

    driftSnow.push({

        mesh:particle,

        vx:0,
        vy:0,
        vz:0,

        life:0
    });
}

for(let i=0;i<160;i++){

    createSnowParticle();
}

function emitSnow(){

    for(let i=0;i<8;i++){

        const p = driftSnow.find(
            s => s.life <= 0
        );

        if(!p) return;

        p.life = 1;

        p.mesh.visible = true;

        const sideOffset =
            player.turn * 2.5;

        p.mesh.position.set(

            player.x - sideOffset +

            (Math.random() - 0.5) * 1.8,

            0.3 + Math.random() * 0.4,

            7 + Math.random() * 1.5
        );

        p.vx =
            player.turn * 2.8 +
            (Math.random() - 0.5) * 0.18;

        p.vy =
            0.06 + Math.random() * 0.08;

        p.vz =
            0.05 + Math.random() * 0.08;

        p.mesh.scale.setScalar(
            1.2 + Math.random() * 1.8
        );
    }
}

////////////////////////////////////////////////////////////
// TREES
////////////////////////////////////////////////////////////

const obstacles = [];

function createTree(z){

    const group = new THREE.Group();

    const trunk = new THREE.Mesh(

        new THREE.CylinderGeometry(
            0.22,
            0.35,
            2.8,
            10
        ),

        new THREE.MeshStandardMaterial({
            color:0x6b3e1e
        })
    );

    trunk.position.y = 1.3;

    group.add(trunk);

    for(let i=0;i<3;i++){

        const leaves = new THREE.Mesh(

            new THREE.ConeGeometry(
                1.8 - i * 0.35,
                3.8 - i * 0.4,
                12
            ),

            new THREE.MeshStandardMaterial({
                color:0x145c1d + i * 0x082008
            })
        );

        leaves.position.y =
            3 + i * 1.4;

        group.add(leaves);
    }

    group.position.set(
        (Math.random()-0.5) * 24,
        0,
        z
    );

    scene.add(group);

    obstacles.push(group);
}

for(let i=0;i<220;i++){

    createTree(-i * 22);
}

////////////////////////////////////////////////////////////
// RAMPS
////////////////////////////////////////////////////////////

const ramps = [];

function createRamp(z){

    const ramp = new THREE.Mesh(

        new THREE.BoxGeometry(
            3,
            1,
            4
        ),

        new THREE.MeshStandardMaterial({
            color:0x8b5a2b
        })
    );

    ramp.rotation.x = 0.35;

    ramp.position.set(
        (Math.random()-0.5) * 18,
        0.5,
        z
    );

    scene.add(ramp);

    ramps.push(ramp);
}

for(let i=0;i<40;i++){

    createRamp(-i * 120 - 80);
}

////////////////////////////////////////////////////////////
// ROCKS
////////////////////////////////////////////////////////////

const barriers = [];

function createBarrier(z){

    const rock = new THREE.Mesh(

        new THREE.DodecahedronGeometry(
            1.8,
            0
        ),

        new THREE.MeshStandardMaterial({
            color:0x5c4635,
            roughness:1,
            flatShading:true
        })
    );

    rock.scale.set(
        1 + Math.random() * 1.2,
        0.7 + Math.random() * 0.5,
        1 + Math.random() * 0.8
    );

    rock.rotation.set(
        Math.random(),
        Math.random(),
        Math.random()
    );

    rock.position.set(
        (Math.random()-0.5) * 16,
        1,
        z
    );

    rock.castShadow = true;

    scene.add(rock);

    barriers.push(rock);
}

for(let i=0;i<35;i++){

    createBarrier(-i * 150 - 120);
}

////////////////////////////////////////////////////////////
// COINS
////////////////////////////////////////////////////////////

const coins = [];

function createCoin(z){

    const coin = new THREE.Mesh(

        new THREE.TorusGeometry(
            0.5,
            0.18,
            8,
            16
        ),

        new THREE.MeshStandardMaterial({
            color:0xffd700,
            emissive:0xaa8800
        })
    );

    coin.rotation.x = Math.PI / 2;

    coin.position.set(
        (Math.random()-0.5) * 18,
        1.4,
        z
    );

    scene.add(coin);

    coins.push(coin);
}

for(let i=0;i<120;i++){

    createCoin(-i * 28 - 15);
}

////////////////////////////////////////////////////////////
// CONTROLS
////////////////////////////////////////////////////////////

const keys = {};

window.addEventListener('keydown',e=>{

    keys[e.key.toLowerCase()] = true;

    if(
        e.code === 'Space' &&
        player.grounded &&
        playing &&
        !player.crashing
    ){

        player.vy = 0.32;

        jumpSound.currentTime = 0;
        jumpSound.play();

        player.grounded = false;
    }
});

window.addEventListener('keyup',e=>{

    keys[e.key.toLowerCase()] = false;
});

////////////////////////////////////////////////////////////
// UI
////////////////////////////////////////////////////////////

const scoreEl =
    document.getElementById('score');

const menu =
    document.getElementById('menu');

const startBtn =
    document.getElementById('startBtn');

let score = 0;
let playing = false;

////////////////////////////////////////////////////////////
// START
////////////////////////////////////////////////////////////

startBtn.onclick = async ()=>{

    resetGame();

    playing = true;

    menu.style.display = 'none';

    try{

        windSound.currentTime = 0;
        await windSound.play();

    }catch(e){}
};

////////////////////////////////////////////////////////////
// RESET
////////////////////////////////////////////////////////////

function resetGame(){

    score = 0;

    player.x = 0;
    player.y = 0;
    player.speed = 0.9;
    player.vy = 0;
    player.turn = 0;
    player.grounded = true;
    player.crashing = false;
    player.crashTimer = 0;

    camera.rotation.set(0,0,0);

    const safeDistance = -120;

    obstacles.forEach((tree,i)=>{

        tree.position.z =
            safeDistance - (i * 22);

        tree.position.x =
            (Math.random()-0.5) * 24;
    });

    ramps.forEach((ramp,i)=>{

        ramp.position.z =
            safeDistance - 200 - (i * 120);

        ramp.position.x =
            (Math.random()-0.5) * 18;
    });

    barriers.forEach((barrier,i)=>{

        barrier.position.z =
            safeDistance - 350 - (i * 150);

        barrier.position.x =
            (Math.random()-0.5) * 16;
    });

    coins.forEach((coin,i)=>{

        coin.position.z =
            safeDistance - 50 - (i * 28);

        coin.position.x =
            (Math.random()-0.5) * 18;
    });

    menu.querySelector('h1').textContent =
        'Snow Rider 3D';
}

////////////////////////////////////////////////////////////
// CRASH
////////////////////////////////////////////////////////////

function crash(){

    if(player.crashing) return;

    player.crashing = true;

    player.crashTimer = 80;

    crashSound.currentTime = 0;
    crashSound.play();

    windSound.pause();
}

////////////////////////////////////////////////////////////
// GAME OVER
////////////////////////////////////////////////////////////

function gameOver(){

    playing = false;

    menu.style.display = 'flex';

    menu.querySelector('h1').textContent =
        'CRASHED!';
}

////////////////////////////////////////////////////////////
// ANIMATE
////////////////////////////////////////////////////////////

function animate(){

    requestAnimationFrame(animate);

    if(playing){

        if(player.crashing){

            player.crashTimer--;

            camera.rotation.x += 0.06;
            camera.rotation.z += 0.08;

            camera.position.y -= 0.03;

            if(player.crashTimer <= 0){

                player.crashing = false;

                gameOver();
            }

            renderer.render(scene,camera);

            return;
        }

        ////////////////////////////////////////////////////////////
        // MOVEMENT
        ////////////////////////////////////////////////////////////

        const targetTurn = (()=>{

            if(keys['a'] || keys['arrowleft']){

                player.x -= 0.22;

                return 0.32;
            }

            if(keys['d'] || keys['arrowright']){

                player.x += 0.22;

                return -0.32;
            }

            return 0;

        })();

        player.turn +=
            (targetTurn - player.turn) * 0.12;

        player.x = Math.max(
            -12,
            Math.min(12,player.x)
        );

        ////////////////////////////////////////////////////////////
        // JUMP
        ////////////////////////////////////////////////////////////

        player.vy -= 0.018;
        player.y += player.vy;

        if(player.y <= 0){

            player.y = 0;
            player.vy = 0;
            player.grounded = true;
        }

        ////////////////////////////////////////////////////////////
        // CAMERA
        ////////////////////////////////////////////////////////////

        camera.position.set(
            player.x,
            2.3 + player.y,
            10
        );

        camera.lookAt(
            player.x + player.turn * 12,
            1.2 + player.y,
            -30
        );

        ////////////////////////////////////////////////////////////
        // SKI ANIMATION
        ////////////////////////////////////////////////////////////

        skiLeft.rotation.y +=
            ((player.turn * 1.8) - skiLeft.rotation.y)
            * 0.18;

        skiRight.rotation.y +=
            ((player.turn * 1.8) - skiRight.rotation.y)
            * 0.18;

        skiLeft.rotation.z =
            -player.turn * 0.7;

        skiRight.rotation.z =
            -player.turn * 0.7;

        skiLeft.position.x =
            -0.3 - player.turn * 0.55;

        skiRight.position.x =
            0.3 - player.turn * 0.55;

        camera.rotation.z +=
            player.turn * 0.18;

        ////////////////////////////////////////////////////////////
        // DRIFT SNOW
        ////////////////////////////////////////////////////////////

        const driftAmount =
            Math.abs(player.turn);

        if(driftAmount > 0.12){

            emitSnow();
        }

        driftSnow.forEach(p=>{

            if(p.life > 0){

                p.life -= 0.025;

                p.mesh.position.x += p.vx;
                p.mesh.position.y += p.vy;
                p.mesh.position.z += p.vz;

                p.vy -= 0.002;

                p.mesh.scale.setScalar(
                    1.5 + (1 - p.life) * 4.5
                );

                p.mesh.material.opacity =
                    p.life * 0.9;

                if(p.life <= 0){

                    p.mesh.visible = false;
                }
            }
        });

        ////////////////////////////////////////////////////////////
        // TREES
        ////////////////////////////////////////////////////////////

        obstacles.forEach(tree=>{

            tree.position.z += player.speed;

            if(tree.position.z > 20){

                tree.position.z = -4800;

                tree.position.x =
                    (Math.random()-0.5) * 24;
            }

            const dx =
                tree.position.x - player.x;

            const dz =
                tree.position.z - player.z;

            if(
                Math.abs(dx) < 1.5 &&
                Math.abs(dz) < 2
            ){

                crash();
            }
        });

        ////////////////////////////////////////////////////////////
        // RAMPS
        ////////////////////////////////////////////////////////////

        ramps.forEach(ramp=>{

            ramp.position.z += player.speed;

            if(ramp.position.z > 20){

                ramp.position.z = -5000;

                ramp.position.x =
                    (Math.random()-0.5) * 18;
            }

            const dx =
                ramp.position.x - player.x;

            const dz =
                ramp.position.z - player.z;

            if(
                Math.abs(dx) < 2 &&
                Math.abs(dz) < 3 &&
                player.grounded
            ){

                player.vy = 0.42;
                player.grounded = false;
            }
        });

        ////////////////////////////////////////////////////////////
        // ROCKS
        ////////////////////////////////////////////////////////////

        barriers.forEach(barrier=>{

            barrier.position.z += player.speed;

            if(barrier.position.z > 20){

                barrier.position.z = -5200;

                barrier.position.x =
                    (Math.random()-0.5) * 16;
            }

            const dx =
                barrier.position.x - player.x;

            const dz =
                barrier.position.z - player.z;

            if(
                Math.abs(dx) < 2.8 &&
                Math.abs(dz) < 1.5
            ){

                if(player.y < 1.2){

                    crash();
                }
            }
        });

        ////////////////////////////////////////////////////////////
        // COINS
        ////////////////////////////////////////////////////////////

        coins.forEach(coin=>{

            coin.rotation.z += 0.08;

            coin.position.z += player.speed;

            if(coin.position.z > 20){

                coin.position.z = -4500;

                coin.position.x =
                    (Math.random()-0.5) * 18;
            }

            const dx =
                coin.position.x - player.x;

            const dz =
                coin.position.z - player.z;

            if(
                Math.abs(dx) < 1.2 &&
                Math.abs(dz) < 2
            ){

                score += 25;

                coinSound.currentTime = 0;
                coinSound.play();

                coin.position.z = -4500;
            }
        });

        ////////////////////////////////////////////////////////////
        // SCORE
        ////////////////////////////////////////////////////////////

        player.speed += 0.00012;

        score += 0.2;

        scoreEl.textContent =
            Math.floor(score);
    }

    renderer.render(scene,camera);
}

animate();

////////////////////////////////////////////////////////////
// RESIZE
////////////////////////////////////////////////////////////

window.addEventListener('resize',()=>{

    camera.aspect =
        window.innerWidth /
        window.innerHeight;

    camera.updateProjectionMatrix();

    renderer.setSize(
        window.innerWidth,
        window.innerHeight
    );
});

</script>

</body>
</html>
