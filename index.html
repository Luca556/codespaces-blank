<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Snow Rider 3D Clone</title>

<style>

body {
    margin: 0;
    overflow: hidden;
    background: #87ceeb;
    font-family: Arial, sans-serif;
}

canvas {
    display: block;
}

#ui {
    position: absolute;
    top: 15px;
    left: 15px;
    color: white;
    font-size: 28px;
    font-weight: bold;
    text-shadow: 2px 2px 4px black;
    z-index: 10;
}

#menu {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.45);
    color: white;
    z-index: 20;
}

#menu h1 {
    font-size: 64px;
    margin-bottom: 20px;
}

#menu button {
    padding: 16px 36px;
    font-size: 24px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-weight: bold;
}

#controls {
    margin-top: 20px;
    font-size: 20px;
}

</style>
</head>

<body>

<div id="ui">
    Score: <span id="score">0</span>
</div>

<div id="menu">

    <h1>Snow Rider 3D</h1>

    <button id="startBtn">
        START
    </button>

    <div id="controls">
        Move: A / D or ← / →<br>
        Jump: SPACE
    </div>

</div>

<script type="module">

import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js';

////////////////////////////////////////////////////////////
// SCENE
////////////////////////////////////////////////////////////

const scene = new THREE.Scene();

scene.fog = new THREE.Fog(
    0xdff3ff,
    25,
    180
);

const camera = new THREE.PerspectiveCamera(
    80,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
);

const renderer = new THREE.WebGLRenderer({
    antialias: true
});

renderer.setSize(
    window.innerWidth,
    window.innerHeight
);

renderer.shadowMap.enabled = true;

document.body.appendChild(renderer.domElement);

////////////////////////////////////////////////////////////
// LIGHTING
////////////////////////////////////////////////////////////

const hemi = new THREE.HemisphereLight(
    0xffffff,
    0xbfdfff,
    1.2
);

scene.add(hemi);

const sun = new THREE.DirectionalLight(
    0xffffff,
    1.3
);

sun.position.set(20, 40, 10);

sun.castShadow = true;

scene.add(sun);

////////////////////////////////////////////////////////////
// TERRAIN
////////////////////////////////////////////////////////////

const terrainGeo = new THREE.PlaneGeometry(
    70,
    5000,
    40,
    200
);

const pos = terrainGeo.attributes.position;

for (let i = 0; i < pos.count; i++) {

    const x = pos.getX(i);
    const y = pos.getY(i);

    const noise =
        Math.sin(x * 0.15) * 0.6 +
        Math.cos(y * 0.05) * 1.5 +
        Math.sin((x + y) * 0.03) * 1.2;

    pos.setZ(i, noise);
}

terrainGeo.computeVertexNormals();

const terrainMat = new THREE.MeshStandardMaterial({
    color: 0xffffff
});

const terrain = new THREE.Mesh(
    terrainGeo,
    terrainMat
);

terrain.rotation.x = -Math.PI / 2;

terrain.position.z = -2400;

terrain.receiveShadow = true;

scene.add(terrain);

////////////////////////////////////////////////////////////
// WALLS
////////////////////////////////////////////////////////////

function createBarrier(x) {

    const geo = new THREE.BoxGeometry(
        2,
        5,
        5000
    );

    const mat = new THREE.MeshStandardMaterial({
        color: 0x666666
    });

    const wall = new THREE.Mesh(
        geo,
        mat
    );

    wall.position.set(
        x,
        2.5,
        -2400
    );

    wall.castShadow = true;

    scene.add(wall);
}

createBarrier(-15);
createBarrier(15);

////////////////////////////////////////////////////////////
// PLAYER
////////////////////////////////////////////////////////////

const player = {

    x: 0,
    y: 0,
    z: 8,

    speed: 0.9,

    sway: 0,

    vy: 0,

    grounded: true,

    turn: 0
};

////////////////////////////////////////////////////////////
// SKIS
////////////////////////////////////////////////////////////

const skiGeo = new THREE.BoxGeometry(
    0.15,
    0.05,
    2.2
);

const skiMat = new THREE.MeshStandardMaterial({
    color: 0xff3333
});

const skiLeft = new THREE.Mesh(
    skiGeo,
    skiMat
);

const skiRight = new THREE.Mesh(
    skiGeo,
    skiMat
);

skiLeft.position.set(
    -0.3,
    -0.55,
    -1.2
);

skiRight.position.set(
    0.3,
    -0.55,
    -1.2
);

camera.add(skiLeft);
camera.add(skiRight);

scene.add(camera);

////////////////////////////////////////////////////////////
// TREES
////////////////////////////////////////////////////////////

const obstacles = [];

function createTree(z) {

    const group = new THREE.Group();

    ////////////////////////////////////////////////////////////
    // TRUNK
    ////////////////////////////////////////////////////////////

    const trunk = new THREE.Mesh(

        new THREE.CylinderGeometry(
            0.22,
            0.35,
            2.8,
            10
        ),

        new THREE.MeshStandardMaterial({
            color: 0x6b3e1e,
            roughness: 1
        })
    );

    trunk.position.y = 1.3;

    trunk.castShadow = true;

    group.add(trunk);

    ////////////////////////////////////////////////////////////
    // LOWER LEAVES
    ////////////////////////////////////////////////////////////

    const leaves1 = new THREE.Mesh(

        new THREE.ConeGeometry(
            1.8,
            3.8,
            12
        ),

        new THREE.MeshStandardMaterial({
            color: 0x145c1d,
            roughness: 1
        })
    );

    leaves1.position.y = 3;

    leaves1.castShadow = true;

    group.add(leaves1);

    ////////////////////////////////////////////////////////////
    // MIDDLE LEAVES
    ////////////////////////////////////////////////////////////

    const leaves2 = new THREE.Mesh(

        new THREE.ConeGeometry(
            1.4,
            3.2,
            12
        ),

        new THREE.MeshStandardMaterial({
            color: 0x1b6e25,
            roughness: 1
        })
    );

    leaves2.position.y = 4.5;

    leaves2.castShadow = true;

    group.add(leaves2);

    ////////////////////////////////////////////////////////////
    // TOP LEAVES
    ////////////////////////////////////////////////////////////

    const leaves3 = new THREE.Mesh(

        new THREE.ConeGeometry(
            1,
            2.5,
            12
        ),

        new THREE.MeshStandardMaterial({
            color: 0x228b2d,
            roughness: 1
        })
    );

    leaves3.position.y = 5.8;

    leaves3.castShadow = true;

    group.add(leaves3);

    ////////////////////////////////////////////////////////////
    // POSITION
    ////////////////////////////////////////////////////////////

    group.position.set(
        (Math.random() - 0.5) * 24,
        0,
        z
    );

    ////////////////////////////////////////////////////////////
    // RANDOM TREE SCALE
    ////////////////////////////////////////////////////////////

    const scale =
        0.8 + Math.random() * 0.8;

    group.scale.set(
        scale,
        scale,
        scale
    );

    ////////////////////////////////////////////////////////////
    // RANDOM ROTATION
    ////////////////////////////////////////////////////////////

    group.rotation.y =
        Math.random() * Math.PI;

    scene.add(group);

    obstacles.push(group);
}

for (let i = 0; i < 220; i++) {

    createTree(-i * 22);
}

////////////////////////////////////////////////////////////
// RAMPS
////////////////////////////////////////////////////////////

const ramps = [];

function createRamp(z) {

    const rampGroup = new THREE.Group();

    const ramp = new THREE.Mesh(

        new THREE.BoxGeometry(
            3,
            1,
            4
        ),

        new THREE.MeshStandardMaterial({
            color: 0x8b5a2b
        })
    );

    ramp.rotation.x = 0.35;

    ramp.castShadow = true;

    rampGroup.add(ramp);

    rampGroup.position.set(
        (Math.random() - 0.5) * 18,
        0.5,
        z
    );

    scene.add(rampGroup);

    ramps.push(rampGroup);
}

for (let i = 0; i < 40; i++) {

    createRamp(-i * 120 - 80);
}

////////////////////////////////////////////////////////////
// LOW BARRIERS
////////////////////////////////////////////////////////////

const barriers = [];

function createLowBarrier(z) {

    const barrier = new THREE.Mesh(

        new THREE.BoxGeometry(
            5,
            2,
            1
        ),

        new THREE.MeshStandardMaterial({
            color: 0xcc2222
        })
    );

    barrier.position.set(
        (Math.random() - 0.5) * 16,
        1,
        z
    );

    barrier.castShadow = true;

    scene.add(barrier);

    barriers.push(barrier);
}

for (let i = 0; i < 35; i++) {

    createLowBarrier(-i * 150 - 120);
}

////////////////////////////////////////////////////////////
// COINS
////////////////////////////////////////////////////////////

const coins = [];

function createCoin(z) {

    const coin = new THREE.Mesh(

        new THREE.TorusGeometry(
            0.5,
            0.18,
            8,
            16
        ),

        new THREE.MeshStandardMaterial({
            color: 0xffd700,
            emissive: 0xaa8800
        })
    );

    coin.rotation.x = Math.PI / 2;

    coin.position.set(
        (Math.random() - 0.5) * 18,
        1.4,
        z
    );

    scene.add(coin);

    coins.push(coin);
}

for (let i = 0; i < 120; i++) {

    createCoin(-i * 28 - 15);
}

////////////////////////////////////////////////////////////
// SNOW
////////////////////////////////////////////////////////////

const snowGeo = new THREE.BufferGeometry();

const snowVerts = [];

for (let i = 0; i < 4000; i++) {

    snowVerts.push(
        (Math.random() - 0.5) * 120,
        Math.random() * 35,
        (Math.random() - 0.5) * 220
    );
}

snowGeo.setAttribute(
    'position',
    new THREE.Float32BufferAttribute(
        snowVerts,
        3
    )
);

const snowMat = new THREE.PointsMaterial({
    color: 0xffffff,
    size: 0.12,
    transparent: true,
    opacity: 0.9
});

const snow = new THREE.Points(
    snowGeo,
    snowMat
);

scene.add(snow);

////////////////////////////////////////////////////////////
// CONTROLS
////////////////////////////////////////////////////////////

const keys = {};

window.addEventListener('keydown', e => {

    keys[e.key.toLowerCase()] = true;

    if (
        e.code === 'Space' &&
        player.grounded &&
        playing
    ) {
        player.vy = 0.32;
        player.grounded = false;
    }
});

window.addEventListener('keyup', e => {

    keys[e.key.toLowerCase()] = false;
});

////////////////////////////////////////////////////////////
// UI
////////////////////////////////////////////////////////////

const scoreEl =
    document.getElementById('score');

const menu =
    document.getElementById('menu');

const startBtn =
    document.getElementById('startBtn');

let score = 0;

let playing = false;

////////////////////////////////////////////////////////////
// START
////////////////////////////////////////////////////////////

startBtn.onclick = () => {

    resetGame();

    playing = true;

    menu.style.display = 'none';
};

////////////////////////////////////////////////////////////
// RESET
////////////////////////////////////////////////////////////

function resetGame() {

    score = 0;

    player.x = 0;
    player.y = 0;

    player.speed = 0.9;

    player.vy = 0;

    player.grounded = true;
}

////////////////////////////////////////////////////////////
// GAME OVER
////////////////////////////////////////////////////////////

function gameOver() {

    playing = false;

    menu.style.display = 'flex';

    menu.querySelector('h1').textContent =
        'CRASHED!';
}

////////////////////////////////////////////////////////////
// ANIMATION LOOP
////////////////////////////////////////////////////////////

function animate() {

    requestAnimationFrame(animate);

    if (playing) {

        ////////////////////////////////////////////
        // MOVEMENT
        ////////////////////////////////////////////

        const targetTurn = (() => {

            if (
                keys['a'] ||
                keys['arrowleft']
            ) {

                player.x -= 0.22;

                return 0.32;
            }

            if (
                keys['d'] ||
                keys['arrowright']
            ) {

                player.x += 0.22;

                return -0.32;
            }

            return 0;

        })();

        ////////////////////////////////////////////////////////////
        // SMOOTH TURNING
        ////////////////////////////////////////////////////////////

        player.turn += (
            targetTurn - player.turn
        ) * 0.12;

        player.x = Math.max(
            -12,
            Math.min(12, player.x)
        );

        ////////////////////////////////////////////
        // JUMPING
        ////////////////////////////////////////////

        player.vy -= 0.018;

        player.y += player.vy;

        if (player.y <= 0) {

            player.y = 0;

            player.vy = 0;

            player.grounded = true;
        }

        ////////////////////////////////////////////
        // CAMERA
        ////////////////////////////////////////////

        player.sway += (
            (player.x * 0.04) -
            player.sway
        ) * 0.08;

        camera.position.set(
            player.x,
            2.3 + player.y,
            10
        );

        camera.rotation.z = -player.sway;

        camera.rotation.y =
            player.turn * 0.35;

        camera.lookAt(
            player.x + player.turn * 6,
            1.2 + player.y,
            -30
        );

        ////////////////////////////////////////////
        // SKI ANIMATION
        ////////////////////////////////////////////

        skiLeft.rotation.y =
            player.turn * 1.2;

        skiRight.rotation.y =
            player.turn * 1.2;

        skiLeft.rotation.z =
            player.turn * 0.3;

        skiRight.rotation.z =
            player.turn * 0.3;

        const skiBob =
            Math.sin(Date.now() * 0.008) * 0.025;

        skiLeft.position.y =
            -0.55 + skiBob;

        skiRight.position.y =
            -0.55 - skiBob;

        ////////////////////////////////////////////
        // TREES
        ////////////////////////////////////////////

        obstacles.forEach(tree => {

            tree.position.z += player.speed;

            if (tree.position.z > 20) {

                tree.position.z = -4800;

                tree.position.x =
                    (Math.random() - 0.5) * 24;
            }

            const dx =
                tree.position.x - player.x;

            const dz =
                tree.position.z - player.z;

            if (
                Math.abs(dx) < 1.5 &&
                Math.abs(dz) < 2
            ) {
                gameOver();
            }
        });

        ////////////////////////////////////////////
        // RAMPS
        ////////////////////////////////////////////

        ramps.forEach(ramp => {

            ramp.position.z += player.speed;

            if (ramp.position.z > 20) {

                ramp.position.z = -5000;

                ramp.position.x =
                    (Math.random() - 0.5) * 18;
            }

            const dx =
                ramp.position.x - player.x;

            const dz =
                ramp.position.z - player.z;

            if (
                Math.abs(dx) < 2 &&
                Math.abs(dz) < 3 &&
                player.grounded
            ) {

                player.vy = 0.42;

                player.grounded = false;
            }
        });

        ////////////////////////////////////////////
        // LOW BARRIERS
        ////////////////////////////////////////////

        barriers.forEach(barrier => {

            barrier.position.z += player.speed;

            if (barrier.position.z > 20) {

                barrier.position.z = -5200;

                barrier.position.x =
                    (Math.random() - 0.5) * 16;
            }

            const dx =
                barrier.position.x - player.x;

            const dz =
                barrier.position.z - player.z;

            if (
                Math.abs(dx) < 2.8 &&
                Math.abs(dz) < 1.5
            ) {

                if (player.y < 1.2) {

                    gameOver();
                }
            }
        });

        ////////////////////////////////////////////
        // COINS
        ////////////////////////////////////////////

        coins.forEach(coin => {

            coin.rotation.z += 0.08;

            coin.position.z += player.speed;

            if (coin.position.z > 20) {

                coin.position.z = -4500;

                coin.position.x =
                    (Math.random() - 0.5) * 18;
            }

            const dx =
                coin.position.x - player.x;

            const dz =
                coin.position.z - player.z;

            if (
                Math.abs(dx) < 1.2 &&
                Math.abs(dz) < 2
            ) {

                score += 25;

                coin.position.z = -4500;
            }
        });

        ////////////////////////////////////////////
        // SNOW
        ////////////////////////////////////////////

        snow.position.z +=
            player.speed * 0.25;

        if (snow.position.z > 50) {

            snow.position.z = 0;
        }

        ////////////////////////////////////////////
        // SPEED
        ////////////////////////////////////////////

        player.speed += 0.00012;

        ////////////////////////////////////////////
        // SCORE
        ////////////////////////////////////////////

        score += 0.2;

        scoreEl.textContent =
            Math.floor(score);
    }

    renderer.render(scene, camera);
}

animate();

////////////////////////////////////////////////////////////
// RESIZE
////////////////////////////////////////////////////////////

window.addEventListener('resize', () => {

    camera.aspect =
        window.innerWidth /
        window.innerHeight;

    camera.updateProjectionMatrix();

    renderer.setSize(
        window.innerWidth,
        window.innerHeight
    );
});

</script>

</body>
</html>
